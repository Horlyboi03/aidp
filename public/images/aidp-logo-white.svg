<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E8E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- White Background Circle -->
  <circle cx="100" cy="100" r="95" fill="white"/>
  
  <!-- Decorative Circle Border -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#coralGrad)" stroke-width="3"/>
  
  <!-- Dollar Sign Icon -->
  <circle cx="100" cy="50" r="22" fill="url(#coralGrad)" opacity="0.15"/>
  <text x="100" y="62" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="bold" fill="url(#coralGrad)" text-anchor="middle">$</text>
  
  <!-- AIDP Text with Better Font -->
  <text x="100" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#coralGrad)" text-anchor="middle" letter-spacing="2">AIDP</text>
  
  <!-- Grant Program Text -->
  <text x="100" y="135" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#666" text-anchor="middle" letter-spacing="3">GRANT PROGRAM</text>
  
  <!-- Decorative Elements -->
  <circle cx="45" cy="45" r="2.5" fill="#FF6B6B" opacity="0.6"/>
  <circle cx="155" cy="45" r="2.5" fill="#FF8E8E" opacity="0.6"/>
  <circle cx="45" cy="155" r="2.5" fill="#FF8E8E" opacity="0.6"/>
  <circle cx="155" cy="155" r="2.5" fill="#FF6B6B" opacity="0.6"/>
  
  <!-- Helping Hands Symbol -->
  <g transform="translate(100, 160)" opacity="0.7">
    <!-- Left Hand -->
    <path d="M-12,-3 Q-14,-5 -12,-7 Q-10,-9 -8,-7 L-6,-3 Q-7,-1 -8,-1 Q-9,-1 -10,-2 Z" fill="url(#coralGrad)"/>
    <!-- Right Hand -->
    <path d="M12,-3 Q14,-5 12,-7 Q10,-9 8,-7 L6,-3 Q7,-1 8,-1 Q9,-1 10,-2 Z" fill="url(#coralGrad)"/>
    <!-- Heart -->
    <path d="M-3,-1 Q-3,-3 -1.5,-3 Q0,-3 0,-2 Q0,-3 1.5,-3 Q3,-3 3,-1 Q3,1 0,3 Q-3,1 -3,-1 Z" fill="#FF6B6B"/>
  </g>
</svg>