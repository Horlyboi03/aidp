<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E8E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e" stroke="url(#grad1)" stroke-width="4"/>
  
  <!-- AIDP Text -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#grad1)" text-anchor="middle">AIDP</text>
  
  <!-- Grant Program Text -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="14" fill="#999" text-anchor="middle">GRANT PROGRAM</text>
  
  <!-- Dollar Sign -->
  <circle cx="100" cy="50" r="25" fill="url(#grad1)" opacity="0.2"/>
  <text x="100" y="62" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#grad1)" text-anchor="middle">$</text>
  
  <!-- Decorative Stars -->
  <circle cx="40" cy="40" r="3" fill="#FF6B6B"/>
  <circle cx="160" cy="40" r="3" fill="#FF8E8E"/>
  <circle cx="40" cy="160" r="3" fill="#FF8E8E"/>
  <circle cx="160" cy="160" r="3" fill="#FF6B6B"/>
</svg>