<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="50" viewBox="0 0 150 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="coralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E8E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon Circle -->
  <circle cx="25" cy="25" r="20" fill="url(#coralGradient)" opacity="0.2"/>
  
  <!-- Helping Hands Icon -->
  <g transform="translate(25, 22)">
    <!-- Left Hand -->
    <path d="M-8,-3 Q-10,-5 -8,-7 Q-6,-9 -4,-7 L-2,-3 Q-3,-1 -4,-1 Q-5,-1 -6,-2 Z" 
          fill="url(#coralGradient)"/>
    
    <!-- Right Hand -->
    <path d="M8,-3 Q10,-5 8,-7 Q6,-9 4,-7 L2,-3 Q3,-1 4,-1 Q5,-1 6,-2 Z" 
          fill="url(#coralGradient)"/>
    
    <!-- Heart -->
    <path d="M-2,-1 Q-2,-3 -1,-3 Q0,-3 0,-2 Q0,-3 1,-3 Q2,-3 2,-1 Q2,1 0,3 Q-2,1 -2,-1 Z" 
          fill="#FF6B6B"/>
  </g>
  
  <!-- Dollar Sign -->
  <text x="25" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        fill="url(#coralGradient)" text-anchor="middle">$</text>
  
  <!-- AIDP Text -->
  <text x="65" y="32" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="url(#coralGradient)">AIDP</text>
  
  <!-- Grant Program Text -->
  <text x="120" y="28" font-family="Arial, sans-serif" font-size="8" font-weight="normal" 
        fill="#999">GRANT</text>
  <text x="120" y="36" font-family="Arial, sans-serif" font-size="8" font-weight="normal" 
        fill="#999">PROGRAM</text>
</svg>