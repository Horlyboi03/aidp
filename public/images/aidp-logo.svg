<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E8E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF7A7A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E8E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle with Gradient Border -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gradient2)" stroke-width="3"/>
  
  <!-- Helping Hands Symbol -->
  <g transform="translate(100, 85)">
    <!-- Left Hand -->
    <path d="M-35,-10 Q-40,-15 -35,-20 Q-30,-25 -25,-20 L-20,-10 Q-22,-5 -25,-5 Q-28,-5 -30,-8 Z" 
          fill="url(#gradient2)" opacity="0.9"/>
    
    <!-- Right Hand -->
    <path d="M35,-10 Q40,-15 35,-20 Q30,-25 25,-20 L20,-10 Q22,-5 25,-5 Q28,-5 30,-8 Z" 
          fill="url(#gradient2)" opacity="0.9"/>
    
    <!-- Heart in the middle -->
    <path d="M-8,-5 Q-8,-12 -3,-12 Q0,-12 0,-8 Q0,-12 3,-12 Q8,-12 8,-5 Q8,2 0,8 Q-8,2 -8,-5 Z" 
          fill="#FF6B6B"/>
  </g>
  
  <!-- Dollar Sign Symbol -->
  <g transform="translate(100, 120)">
    <circle cx="0" cy="0" r="18" fill="url(#gradient2)" opacity="0.2"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
          fill="url(#gradient2)" text-anchor="middle">$</text>
  </g>
  
  <!-- AIDP Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="url(#gradient2)" text-anchor="middle">AIDP</text>
  
  <!-- Grant Program Text -->
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="12" font-weight="normal" 
        fill="#666" text-anchor="middle">GRANT PROGRAM</text>
</svg>